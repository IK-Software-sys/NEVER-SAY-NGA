<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Backrooms</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; -webkit-touch-callout: none; -webkit-user-select: none; user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Courier New', Courier, monospace; color: #fff; }
        #gameCanvas { display: block; width: 100vw; height: 100vh; }

        #vignette {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 5;
            background: radial-gradient(circle, transparent 50%, rgba(0,0,0,0.8) 100%);
            box-shadow: inset 0 0 150px rgba(0,0,0,0.9);
        }

        /* HUD */
        #hud { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }

        .barContainer {
            position: absolute; background: rgba(0,0,0,0.65); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 3px; overflow: hidden; backdrop-filter: blur(4px);
        }
        #hpBar { top: 12px; left: 12px; width: 160px; height: 20px; }
        #staminaBar { top: 36px; left: 12px; width: 160px; height: 16px; }
        .barFill { height: 100%; transition: width 0.15s; }
        #hpFill { background: linear-gradient(90deg, #cc2222, #ff4444); width: 100%; }
        #staminaFill { background: linear-gradient(90deg, #22aa22, #44dd44); width: 100%; }
        .barLabel { position: absolute; top: 0; left: 6px; font-size: 10px; line-height: 20px; font-weight: bold; text-shadow: 1px 1px 2px black; letter-spacing: 1px; }
        #staminaBar .barLabel { line-height: 16px; font-size: 9px; }

        #crosshair {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 20px; height: 20px; border: 2px solid rgba(255,255,255,0.35);
            border-radius: 50%; pointer-events: none;
        }
        #crosshair::after {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 3px; height: 3px; background: rgba(255,255,255,0.5); border-radius: 50%;
        }

        #message {
            position: absolute; top: 22%; left: 50%; transform: translateX(-50%);
            font-size: 18px; color: #ddcc88; text-shadow: 0 0 15px rgba(0,0,0,0.9);
            text-align: center; opacity: 0; transition: opacity 0.4s; pointer-events: none;
            background: rgba(0,0,0,0.5); padding: 8px 16px; border-radius: 4px;
        }

        #chickCounter {
            position: absolute; top: 12px; right: 12px;
            font-size: 14px; color: #ffdd00; font-weight: bold;
            text-shadow: 1px 1px 3px black; pointer-events: none;
        }

        /* Mobile Controls - Landscape optimized */
        #mobileControls { position: fixed; bottom: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .touchZone { position: absolute; pointer-events: auto; }

        #joystickZone {
            bottom: 20px; left: 20px; width: 120px; height: 120px;
            border: 3px solid rgba(255,255,255,0.12); border-radius: 50%;
            background: rgba(255,255,255,0.02);
        }
        #joystickKnob {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 42px; height: 42px; background: rgba(255,255,255,0.2);
            border-radius: 50%; pointer-events: none; border: 2px solid rgba(255,255,255,0.35);
        }

        #lookZone { top: 0; right: 0; width: 60%; height: 70%; }

        #sprintBtn {
            bottom: 20px; left: 160px; width: 60px; height: 60px;
            background: rgba(255,255,255,0.06); border: 2px solid rgba(255,255,255,0.2);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 10px; color: #ddd; font-weight: bold; letter-spacing: 1px;
        }
        #sprintBtn.active { background: rgba(100,255,100,0.15); border-color: #5f5; color: #5f5; }

        #attackBtn {
            bottom: 20px; right: 20px; width: 80px; height: 80px;
            background: rgba(255,80,80,0.12); border: 3px solid rgba(255,80,80,0.35);
            border-radius: 50%; display: flex; align-items: center; justify-content: center;
            font-size: 12px; color: #faa; font-weight: bold; letter-spacing: 1px;
        }
        #attackBtn:active { background: rgba(255,80,80,0.3); transform: scale(0.95); }

        /* Loading */
        #loadingScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #050503; display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 99;
        }
        .spinner { width: 45px; height: 45px; border: 3px solid #333; border-top-color: #ddcc88; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        #loadingText { margin-top: 16px; color: #aa9977; font-size: 12px; letter-spacing: 2px; }

        /* Game Over / Win */
        #gameOverScreen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none; flex-direction: column;
            align-items: center; justify-content: center; z-index: 101;
        }
        #gameOverScreen h2 { font-size: 36px; margin-bottom: 16px; letter-spacing: 4px; }
        #gameOverScreen p { color: #887755; margin-bottom: 24px; font-size: 13px; }
        .retryBtn {
            background: rgba(221, 204, 136, 0.08); border: 2px solid #ddcc88;
            color: #ddcc88; padding: 14px 40px; font-size: 16px; font-family: inherit;
            cursor: pointer; backdrop-filter: blur(10px); text-transform: uppercase;
            letter-spacing: 2px; pointer-events: auto;
        }
        .retryBtn:active { background: rgba(221, 204, 136, 0.25); }

        /* Damage flash */
        #damageFlash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, transparent 30%, rgba(255,0,0,0.35) 100%);
            opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 6;
        }

        /* Exit distance indicator */
        #exitIndicator {
            position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
            font-size: 11px; color: #33ff66; opacity: 0.7; pointer-events: none;
            text-shadow: 0 0 8px rgba(0,255,0,0.3);
        }
    </style>
</head>
<body>

<div id="loadingScreen">
    <div class="spinner"></div>
    <div id="loadingText">INITIALIZING...</div>
</div>

<div id="hud" style="display:none;">
    <div id="hpBar" class="barContainer"><div id="hpFill" class="barFill"></div><div class="barLabel">HP</div></div>
    <div id="staminaBar" class="barContainer"><div id="staminaFill" class="barFill"></div><div class="barLabel">STAMINA</div></div>
    <div id="crosshair"></div>
    <div id="message"></div>
    <div id="chickCounter">Chicks: 0</div>
    <div id="exitIndicator">EXIT: ???m</div>

    <div id="mobileControls">
        <div id="joystickZone" class="touchZone"><div id="joystickKnob"></div></div>
        <div id="lookZone" class="touchZone"></div>
        <div id="sprintBtn" class="touchZone">RUN</div>
        <div id="attackBtn" class="touchZone">SLASH</div>
    </div>
</div>

<div id="gameOverScreen">
    <h2 id="goText">YOU DIED</h2>
    <p id="goSub">The backrooms claim another soul.</p>
    <button class="retryBtn" id="retryBtn">TRY AGAIN</button>
</div>

<div id="vignette"></div>
<div id="damageFlash"></div>

<canvas id="gameCanvas"></canvas>

<script type="module">
import * as THREE from 'https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js';
import { GLTFLoader } from 'https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/loaders/GLTFLoader.js';

// ==================== AUDIO ====================
class AudioManager {
    constructor() {
        this.ctx = null;
        this.masterGain = null;
        this.buzzNode = null;
        this.ready = false;
    }

    init() {
        if (this.ready) return;
        this.ctx = new (window.AudioContext || window.webkitAudioContext)();
        this.masterGain = this.ctx.createGain();
        this.masterGain.gain.value = 0.5;
        this.masterGain.connect(this.ctx.destination);
        this.ready = true;
    }

    startBuzz() {
        if (!this.ready) this.init();
        if (this.buzzNode) return;
        const bufferSize = 2 * this.ctx.sampleRate;
        const buffer = this.ctx.createBuffer(1, bufferSize, this.ctx.sampleRate);
        const data = buffer.getChannelData(0);
        for (let i = 0; i < bufferSize; i++) data[i] = (Math.random() * 2 - 1) * 0.5;
        const noise = this.ctx.createBufferSource();
        noise.buffer = buffer;
        noise.loop = true;
        const filter = this.ctx.createBiquadFilter();
        filter.type = 'bandpass';
        filter.frequency.value = 100;
        filter.Q.value = 0.8;
        const gain = this.ctx.createGain();
        gain.gain.value = 0.1;
        noise.connect(filter);
        filter.connect(gain);
        gain.connect(this.masterGain);
        noise.start();
        this.buzzNode = noise;
        setInterval(() => { if (filter) filter.frequency.value = 80 + Math.random() * 60; }, 200);
    }

    stopBuzz() { if (this.buzzNode) { this.buzzNode.stop(); this.buzzNode = null; } }

    playBeep() {
        if (!this.ready) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = 900 + Math.random() * 200;
        osc.type = 'sine';
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.06);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.06);
    }

    playSlash() {
        if (!this.ready) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.setValueAtTime(600, this.ctx.currentTime);
        osc.frequency.exponentialRampToValueAtTime(80, this.ctx.currentTime + 0.1);
        gain.gain.setValueAtTime(0.12, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.1);
    }

    playHit() {
        if (!this.ready) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = 120;
        osc.type = 'sawtooth';
        gain.gain.setValueAtTime(0.2, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.12);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.12);
    }

    playStep() {
        if (!this.ready) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.value = 60 + Math.random() * 30;
        osc.type = 'triangle';
        gain.gain.setValueAtTime(0.06, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.03);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.03);
    }

    playChick() {
        if (!this.ready) return;
        const osc = this.ctx.createOscillator();
        const gain = this.ctx.createGain();
        osc.frequency.setValueAtTime(800, this.ctx.currentTime);
        osc.frequency.linearRampToValueAtTime(1200, this.ctx.currentTime + 0.08);
        gain.gain.setValueAtTime(0.08, this.ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.15);
        osc.connect(gain);
        gain.connect(this.masterGain);
        osc.start();
        osc.stop(this.ctx.currentTime + 0.15);
    }
}

// ==================== PARTICLES ====================
class ParticleSystem {
    constructor(scene) {
        this.scene = scene;
        this.particles = [];
    }

    burst(position, color = 0xffaa00, count = 20) {
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(count * 3);
        const velocities = [];
        for (let i = 0; i < count; i++) {
            positions[i*3] = position.x;
            positions[i*3+1] = position.y;
            positions[i*3+2] = position.z;
            velocities.push(new THREE.Vector3(
                (Math.random()-0.5)*4, Math.random()*3 + 1, (Math.random()-0.5)*4
            ));
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        const material = new THREE.PointsMaterial({ color, size: 0.1, transparent: true, opacity: 1, sizeAttenuation: true });
        const points = new THREE.Points(geometry, material);
        this.scene.add(points);
        this.particles.push({ mesh: points, velocities, life: 1.0 });
    }

    update(dt) {
        for (let i = this.particles.length - 1; i >= 0; i--) {
            const p = this.particles[i];
            p.life -= dt * 2.5;
            if (p.life <= 0) {
                this.scene.remove(p.mesh);
                p.mesh.geometry.dispose();
                p.mesh.material.dispose();
                this.particles.splice(i, 1);
                continue;
            }
            const pos = p.mesh.geometry.attributes.position.array;
            for (let j = 0; j < p.velocities.length; j++) {
                pos[j*3] += p.velocities[j].x * dt;
                pos[j*3+1] += p.velocities[j].y * dt;
                pos[j*3+2] += p.velocities[j].z * dt;
                p.velocities[j].y -= 5 * dt;
            }
            p.mesh.geometry.attributes.position.needsUpdate = true;
            p.mesh.material.opacity = p.life;
        }
    }
}

// ==================== ENEMY AI ====================
class Enemy {
    constructor(type, scene, position, mapMeshes) {
        this.type = type;
        this.scene = scene;
        this.position = position.clone();
        this.mapMeshes = mapMeshes;
        this.state = 'ROAMING';
        this.hp = type === 'cat' ? 40 : 120;
        this.speed = type === 'cat' ? 3.5 : 2.5;
        this.runSpeed = type === 'cat' ? 7 : 5;
        this.damage = type === 'cat' ? 12 : 20;
        this.detectRange = 18;
        this.attackRange = 2.2;
        this.attackCooldown = 0;
        this.roamTarget = this.getRandomPoint();
        this.huntTimer = 0;
        this.mesh = null;
        this.mixer = null;
        this.animOffset = Math.random() * 100;
    }

    async load(assets) {
        const key = this.type === 'cat' ? 'cat' : 'enemy';
        if (assets[key]) {
            this.mesh = assets[key].scene.clone();
            this.scene.add(this.mesh);
            if (assets[key].animations?.length > 0) {
                this.mixer = new THREE.AnimationMixer(this.mesh);
                const action = this.mixer.clipAction(assets[key].animations[0]);
                action.play();
            }
        } else {
            const geo = new THREE.BoxGeometry(0.8, 1.2, 0.8);
            const mat = new THREE.MeshStandardMaterial({ color: this.type === 'cat' ? 0xff6600 : 0x440000 });
            this.mesh = new THREE.Mesh(geo, mat);
            this.scene.add(this.mesh);
        }
        this.mesh.position.copy(this.position);
    }

    getRandomPoint() {
        return new THREE.Vector3((Math.random()-0.5)*70, 1, (Math.random()-0.5)*70);
    }

    update(dt, playerPos) {
        if (!this.mesh) return 0;
        const dist = this.position.distanceTo(playerPos);

        if (this.state === 'ROAMING') {
            if (dist < this.detectRange && this.hasLineOfSight(playerPos)) {
                this.state = 'HUNTING';
                this.huntTimer = 0;
            }
        } else if (this.state === 'HUNTING') {
            if (!this.hasLineOfSight(playerPos)) {
                this.huntTimer += dt;
                if (this.huntTimer > 2.5) {
                    this.state = 'ROAMING';
                    this.roamTarget = this.getRandomPoint();
                }
            } else {
                this.huntTimer = 0;
            }
        }

        const target = this.state === 'HUNTING' ? playerPos : this.roamTarget;
        const currentSpeed = this.state === 'HUNTING' ? this.runSpeed : this.speed;
        const dir = new THREE.Vector3().subVectors(target, this.position).normalize();
        dir.y = 0;
        this.position.x += dir.x * currentSpeed * dt;
        this.position.z += dir.z * currentSpeed * dt;

        if (this.type === 'cat') {
            this.position.y = 0.6 + Math.sin(Date.now()*0.008 + this.animOffset) * 0.15;
        } else {
            this.position.y = 1.0 + Math.sin(Date.now()*0.005 + this.animOffset) * 0.05;
        }

        if (dir.length() > 0.01) {
            this.mesh.lookAt(this.position.clone().add(dir));
        }
        this.mesh.position.copy(this.position);
        if (this.mixer) this.mixer.update(dt);

        if (this.state === 'HUNTING' && dist < this.attackRange) {
            this.attackCooldown -= dt;
            if (this.attackCooldown <= 0) {
                this.attackCooldown = this.type === 'cat' ? 1.0 : 1.8;
                return this.damage;
            }
        }
        return 0;
    }

    hasLineOfSight(target) {
        const origin = this.position.clone().add(new THREE.Vector3(0,1,0));
        const dir = new THREE.Vector3().subVectors(target, origin).normalize();
        const raycaster = new THREE.Raycaster(origin, dir, 0, this.detectRange);
        const hits = raycaster.intersectObjects(this.mapMeshes, false);
        return hits.length === 0 || hits[0].distance > origin.distanceTo(target) - 0.5;
    }

    takeDamage(amount) {
        this.hp -= amount;
        if (this.mesh) {
            this.mesh.traverse(c => {
                if (c.material) {
                    const oldEmissive = c.material.emissive ? c.material.emissive.clone() : new THREE.Color(0,0,0);
                    c.material.emissive = new THREE.Color(1,0,0);
                    c.material.emissiveIntensity = 1;
                    setTimeout(() => {
                        if (c.material) { c.material.emissive = oldEmissive; c.material.emissiveIntensity = 0; }
                    }, 100);
                }
            });
        }
        return this.hp <= 0;
    }

    remove() {
        if (this.mesh) this.scene.remove(this.mesh);
    }
}

// ==================== CHICK SYSTEM ====================
class ChickSystem {
    constructor(scene, assets) {
        this.scene = scene;
        this.assets = assets;
        this.chick = null;
        this.spawnTimer = 0;
        this.collected = 0;
    }

    update(dt, playerPos, camera) {
        this.spawnTimer -= dt;
        if (!this.chick && this.spawnTimer <= 0) {
            this.spawnTimer = 8 + Math.random() * 12;
            this.spawnChick(playerPos);
        }
        if (this.chick) {
            const frustum = new THREE.Frustum();
            const projScreenMatrix = new THREE.Matrix4();
            projScreenMatrix.multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse);
            frustum.setFromProjectionMatrix(projScreenMatrix);
            const inView = frustum.containsPoint(this.chick.position);
            const inRange = this.chick.position.distanceTo(playerPos) < 25;
            this.chick.visible = inView && inRange;
            if (this.chick.visible) {
                this.chick.position.y = 0.4 + Math.sin(Date.now()*0.006) * 0.15;
                this.chick.rotation.y += dt * 2;
            }
            if (this.chick.position.distanceTo(playerPos) < 1.5) {
                this.collected++;
                this.removeChick();
                return true;
            }
            if (this.chick.position.distanceTo(playerPos) > 120) this.removeChick();
        }
        return false;
    }

    spawnChick(nearPos) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 5 + Math.random() * 25;
        const pos = new THREE.Vector3(nearPos.x + Math.cos(angle)*dist, 0.4, nearPos.z + Math.sin(angle)*dist);
        if (this.assets['Chick']) {
            this.chick = this.assets['Chick'].scene.clone();
            this.chick.scale.set(0.4,0.4,0.4);
        } else {
            const group = new THREE.Group();
            const body = new THREE.Mesh(new THREE.SphereGeometry(0.3,8,8), new THREE.MeshStandardMaterial({ color: 0xffdd00 }));
            body.position.y = 0.3;
            const beak = new THREE.Mesh(new THREE.ConeGeometry(0.08,0.15,8), new THREE.MeshStandardMaterial({ color: 0xff6600 }));
            beak.rotation.x = Math.PI/2; beak.position.set(0,0.3,0.25);
            group.add(body, beak);
            this.chick = group;
        }
        this.chick.position.copy(pos);
        this.scene.add(this.chick);
    }

    removeChick() {
        if (this.chick) { this.scene.remove(this.chick); this.chick = null; }
    }
}

// ==================== GAME ====================
class Game {
    constructor() {
        this.state = 'LOADING';
        this.scene = new THREE.Scene();
        this.scene.background = new THREE.Color(0x0a0a05);
        this.scene.fog = new THREE.FogExp2(0xcdbb77, 0.025);

        this.camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 200);
        this.renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('gameCanvas'), antialias: true });
        this.renderer.setSize(window.innerWidth, window.innerHeight);
        this.renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        this.renderer.shadowMap.enabled = true;
        this.renderer.shadowMap.type = THREE.PCFSoftShadowMap;

        this.clock = new THREE.Clock();
        this.assets = {};
        this.mapMeshes = [];
        this.enemies = [];
        this.particles = new ParticleSystem(this.scene);
        this.audio = new AudioManager();

        this.player = {
            hp: 100, maxHp: 100, stamina: 100, maxStamina: 100,
            position: new THREE.Vector3(0, 1.7, 0),
            rotation: new THREE.Euler(0, 0, 0),
            height: 1.7, radius: 0.4,
            isSprinting: false, isAttacking: false,
            attackTimer: 0, stepTimer: 0
        };

        this.camera.position.copy(this.player.position);
        this.setupLights();
        this.setupMobileControls();
        this.bindEvents();

        // Start immediately
        this.start();
    }

    setupLights() {
        const ambient = new THREE.AmbientLight(0xffeebb, 0.25);
        this.scene.add(ambient);
        const hemi = new THREE.HemisphereLight(0xffdd88, 0x050510, 0.35);
        this.scene.add(hemi);
    }

    setupMobileControls() {
        this.joystick = { active: false, origin: {x:0,y:0}, value: {x:0,y:0} };
        this.lookInput = { x: 0, y: 0 };
        this.sprintPressed = false;

        const jZone = document.getElementById('joystickZone');
        const jKnob = document.getElementById('joystickKnob');

        const getTouchPos = (t, el) => {
            const rect = el.getBoundingClientRect();
            return { x: t.clientX - rect.left, y: t.clientY - rect.top };
        };

        jZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.changedTouches[0];
            const rect = jZone.getBoundingClientRect();
            this.joystick.active = true;
            this.joystick.origin = { x: rect.width/2, y: rect.height/2 };
            const pos = getTouchPos(t, jZone);
            this.updateJoystick(pos);
        }, {passive: false});

        jZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!this.joystick.active) return;
            for (const t of e.changedTouches) {
                if (this.isInZone(t, jZone)) {
                    this.updateJoystick(getTouchPos(t, jZone));
                }
            }
        }, {passive: false});

        const endJoystick = (e) => {
            e.preventDefault();
            this.joystick.active = false;
            this.joystick.value = {x:0, y:0};
            jKnob.style.transform = 'translate(-50%, -50%)';
        };
        jZone.addEventListener('touchend', endJoystick);
        jZone.addEventListener('touchcancel', endJoystick);

        // Look zone
        const lZone = document.getElementById('lookZone');
        let lookTouchId = null;
        let lookStart = {x:0, y:0};

        lZone.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const t = e.changedTouches[0];
            lookTouchId = t.identifier;
            lookStart = { x: t.clientX, y: t.clientY };
        }, {passive: false});

        lZone.addEventListener('touchmove', (e) => {
            e.preventDefault();
            for (const t of e.changedTouches) {
                if (t.identifier === lookTouchId) {
                    this.lookInput.x = (t.clientX - lookStart.x) * 0.003;
                    this.lookInput.y = (t.clientY - lookStart.y) * 0.003;
                    lookStart = { x: t.clientX, y: t.clientY };
                }
            }
        }, {passive: false});

        const endLook = (e) => {
            for (const t of e.changedTouches) {
                if (t.identifier === lookTouchId) {
                    this.lookInput.x = 0; this.lookInput.y = 0; lookTouchId = null;
                }
            }
        };
        lZone.addEventListener('touchend', endLook);
        lZone.addEventListener('touchcancel', endLook);

        // Sprint
        const sBtn = document.getElementById('sprintBtn');
        sBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.sprintPressed = true; sBtn.classList.add('active'); }, {passive: false});
        sBtn.addEventListener('touchend', (e) => { e.preventDefault(); this.sprintPressed = false; sBtn.classList.remove('active'); });
        sBtn.addEventListener('touchcancel', (e) => { this.sprintPressed = false; sBtn.classList.remove('active'); });

        // Attack
        const aBtn = document.getElementById('attackBtn');
        aBtn.addEventListener('touchstart', (e) => { e.preventDefault(); this.triggerAttack(); }, {passive: false});

        // Retry
        document.getElementById('retryBtn').addEventListener('click', () => location.reload());
    }

    isInZone(touch, el) {
        const rect = el.getBoundingClientRect();
        return touch.clientX >= rect.left && touch.clientX <= rect.right &&
               touch.clientY >= rect.top && touch.clientY <= rect.bottom;
    }

    updateJoystick(pos) {
        const jKnob = document.getElementById('joystickKnob');
        const dx = pos.x - this.joystick.origin.x;
        const dy = pos.y - this.joystick.origin.y;
        const dist = Math.sqrt(dx*dx + dy*dy);
        const maxDist = 45;
        const scale = dist > maxDist ? maxDist / dist : 1;
        this.joystick.value = { x: dx * scale / maxDist, y: dy * scale / maxDist };
        jKnob.style.transform = `translate(calc(-50% + ${dx*scale}px), calc(-50% + ${dy*scale}px))`;
    }

    bindEvents() {
        window.addEventListener('resize', () => {
            this.camera.aspect = window.innerWidth / window.innerHeight;
            this.camera.updateProjectionMatrix();
            this.renderer.setSize(window.innerWidth, window.innerHeight);
        });
    }

    async loadAssets() {
        const loader = new GLTFLoader();
        const files = [
            { name: 'map', file: 'map.glb' },
            { name: 'katana', file: 'katana.glb' },
            { name: 'talk', file: 'talk.glb' },
            { name: 'cat', file: 'cat.glb' },
            { name: 'enemy', file: 'enemy.glb' },
            { name: 'Chick', file: 'Chick.glb' },
            { name: 'buzz', file: 'buzz.glb' }
        ];

        let loaded = 0;
        for (const item of files) {
            try {
                const gltf = await new Promise((resolve, reject) => {
                    loader.load(item.file, resolve, undefined, reject);
                });
                this.assets[item.name] = gltf;
            } catch (e) {
                console.warn(`Failed to load ${item.file}`);
            }
            loaded++;
            document.getElementById('loadingText').textContent = `LOADING... ${Math.round(loaded/files.length*100)}%`;
        }
    }

    async start() {
        await this.loadAssets();
        this.initLevel();
        document.getElementById('loadingScreen').style.display = 'none';
        document.getElementById('hud').style.display = 'block';
        this.state = 'PLAYING';
        this.audio.startBuzz();

        // Request fullscreen on mobile
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(()=>{});
        }
        // Lock landscape
        if (screen.orientation && screen.orientation.lock) {
            screen.orientation.lock('landscape').catch(()=>{});
        }
    }

    initLevel() {
        if (this.assets['map']) {
            const map = this.assets['map'].scene;
            this.scene.add(map);
            map.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true;
                    this.mapMeshes.push(child);
                }
            });

            let furthest = new THREE.Vector3(30,0,30);
            let maxDist = 0;
            map.traverse(child => {
                if (child.isMesh && child.geometry.attributes.position) {
                    const pos = child.geometry.attributes.position;
                    for (let i = 0; i < pos.count; i++) {
                        const v = new THREE.Vector3().fromBufferAttribute(pos, i);
                        v.applyMatrix4(child.matrixWorld);
                        const d = v.distanceTo(new THREE.Vector3(0,0,0));
                        if (d > maxDist) { maxDist = d; furthest.copy(v); }
                    }
                }
            });
            this.spawnExit(furthest);
        } else {
            this.createProceduralBackrooms();
            this.spawnExit(new THREE.Vector3(45,0,45));
        }

        if (this.assets['buzz']) {
            for (let i = 0; i < 6; i++) {
                const buzz = this.assets['buzz'].scene.clone();
                buzz.position.set((Math.random()-0.5)*60, 3, (Math.random()-0.5)*60);
                buzz.scale.set(0.5,0.5,0.5);
                this.scene.add(buzz);
                const pl = new THREE.PointLight(0xffaa44, 0.5, 12);
                pl.position.copy(buzz.position);
                this.scene.add(pl);
            }
        } else {
            for (let i = 0; i < 10; i++) {
                const pl = new THREE.PointLight(0xffaa44, 0.5, 15);
                pl.position.set((Math.random()-0.5)*70, 3+Math.random()*2, (Math.random()-0.5)*70);
                pl.intensity = 0.3 + Math.random()*0.4;
                setInterval(() => { pl.intensity = 0.2 + Math.random()*0.5; }, 100+Math.random()*200);
                this.scene.add(pl);
            }
        }

        for (let i = 0; i < 6; i++) {
            const type = Math.random() > 0.4 ? 'cat' : 'enemy';
            let pos;
            do { pos = new THREE.Vector3((Math.random()-0.5)*70, 1, (Math.random()-0.5)*70); }
            while (pos.length() < 15);
            const enemy = new Enemy(type, this.scene, pos, this.mapMeshes);
            enemy.load(this.assets);
            this.enemies.push(enemy);
        }

        this.setupWeapon();
        this.setupWalkieTalkie();
        this.chickSystem = new ChickSystem(this.scene, this.assets);

        this.player.position.set(0, this.player.height, 0);
        this.camera.position.copy(this.player.position);
    }

    createProceduralBackrooms() {
        const wallMat = new THREE.MeshStandardMaterial({ color: 0xddcc88, roughness: 0.95 });
        const floorMat = new THREE.MeshStandardMaterial({ color: 0xcdbb77, roughness: 1.0 });

        const floor = new THREE.Mesh(new THREE.PlaneGeometry(120,120), floorMat);
        floor.rotation.x = -Math.PI/2;
        floor.receiveShadow = true;
        this.scene.add(floor);
        this.mapMeshes.push(floor);

        const ceil = new THREE.Mesh(new THREE.PlaneGeometry(120,120), floorMat);
        ceil.rotation.x = Math.PI/2;
        ceil.position.y = 4;
        this.scene.add(ceil);

        for (let x = -50; x <= 50; x += 10) {
            for (let z = -50; z <= 50; z += 10) {
                if (Math.random() > 0.6) {
                    const w = Math.random() > 0.5 ? 10 : 0.2;
                    const d = Math.random() > 0.5 ? 0.2 : 10;
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 4, d), wallMat);
                    wall.position.set(x+5, 2, z+5);
                    wall.castShadow = true; wall.receiveShadow = true;
                    this.scene.add(wall);
                    this.mapMeshes.push(wall);
                }
            }
        }
    }

    spawnExit(position) {
        const exitGroup = new THREE.Group();

        const geo = new THREE.CylinderGeometry(1.2, 1.2, 0.1, 32);
        const mat = new THREE.MeshStandardMaterial({ 
            color: 0x00ff44, emissive: 0x00ff44, emissiveIntensity: 3,
            transparent: true, opacity: 0.7
        });
        const portal = new THREE.Mesh(geo, mat);
        portal.position.y = 0.05;
        exitGroup.add(portal);

        const pGeo = new THREE.BufferGeometry();
        const pCount = 50;
        const pPos = new Float32Array(pCount * 3);
        for (let i = 0; i < pCount; i++) {
            pPos[i*3] = (Math.random()-0.5)*2;
            pPos[i*3+1] = Math.random()*3;
            pPos[i*3+2] = (Math.random()-0.5)*2;
        }
        pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
        const pMat = new THREE.PointsMaterial({ color: 0x00ff44, size: 0.08, transparent: true, opacity: 0.6 });
        const pSystem = new THREE.Points(pGeo, pMat);
        exitGroup.add(pSystem);
        this.exitParticles = pSystem;

        const light = new THREE.PointLight(0x00ff44, 3, 20);
        light.position.y = 3;
        exitGroup.add(light);

        exitGroup.position.copy(position);
        exitGroup.position.y = 0;
        this.scene.add(exitGroup);
        this.exit = exitGroup;
        this.exitPosition = position;
    }

    setupWeapon() {
        this.katana = new THREE.Group();
        if (this.assets['katana']) {
            const model = this.assets['katana'].scene;
            model.scale.set(0.4,0.4,0.4);
            this.katana.add(model);
        } else {
            const blade = new THREE.Mesh(new THREE.BoxGeometry(0.08,0.9,0.015), new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.1 }));
            blade.position.y = 0.45;
            const handle = new THREE.Mesh(new THREE.CylinderGeometry(0.03,0.035,0.25,8), new THREE.MeshStandardMaterial({ color: 0x442200, roughness: 0.8 }));
            handle.position.y = -0.125;
            const guard = new THREE.Mesh(new THREE.BoxGeometry(0.2,0.02,0.05), new THREE.MeshStandardMaterial({ color: 0x888888, metalness: 0.8 }));
            this.katana.add(blade, handle, guard);
        }

        this.katana.position.set(0.35, -0.35, -0.6);
        this.katana.rotation.set(0.2, -0.2, -0.4);
        this.camera.add(this.katana);
        this.scene.add(this.camera);

        this.katanaBaseRot = this.katana.rotation.clone();
        this.katanaBasePos = this.katana.position.clone();
    }

    setupWalkieTalkie() {
        this.walkie = new THREE.Group();
        if (this.assets['talk']) {
            const model = this.assets['talk'].scene;
            model.scale.set(0.25,0.25,0.25);
            this.walkie.add(model);
        } else {
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.12,0.22,0.06), new THREE.MeshStandardMaterial({ color: 0x222222, roughness: 0.7 }));
            const ant = new THREE.Mesh(new THREE.CylinderGeometry(0.008,0.008,0.18), new THREE.MeshStandardMaterial({ color: 0x666666, metalness: 0.8 }));
            ant.position.y = 0.18;
            const screen = new THREE.Mesh(new THREE.PlaneGeometry(0.08,0.06), new THREE.MeshStandardMaterial({ color: 0x113311, emissive: 0x002200, emissiveIntensity: 0.5 }));
            screen.position.set(0,0.02,0.031);
            this.walkie.add(body, ant, screen);
        }

        this.walkie.position.set(-0.4, -0.45, -0.5);
        this.walkie.rotation.set(0.1, 0.3, 0.2);
        this.camera.add(this.walkie);

        this.lastBeep = 0;
        this.beepInterval = 5;
    }

    triggerAttack() {
        if (this.player.isAttacking || this.state !== 'PLAYING') return;
        this.player.isAttacking = true;
        this.player.attackTimer = 0.35;
        this.audio.playSlash();
        this.attackHit = false;
    }

    updateAttack(dt) {
        if (!this.player.isAttacking) {
            const t = Date.now() * 0.0015;
            this.katana.rotation.z = this.katanaBaseRot.z + Math.sin(t) * 0.03;
            this.katana.position.y = this.katanaBasePos.y + Math.sin(t*0.7) * 0.015;
            return;
        }

        this.player.attackTimer -= dt;
        const progress = 1 - (this.player.attackTimer / 0.35);

        if (progress < 0.5) {
            const p = progress * 2;
            this.katana.rotation.x = this.katanaBaseRot.x - Math.PI * 0.9 * p;
            this.katana.position.z = this.katanaBasePos.z + 0.3 * p;
        } else {
            const p = (progress - 0.5) * 2;
            this.katana.rotation.x = this.katanaBaseRot.x - Math.PI * 0.9 * (1 - p);
            this.katana.position.z = this.katanaBasePos.z + 0.3 * (1 - p);
        }

        if (progress > 0.25 && progress < 0.45 && !this.attackHit) {
            this.attackHit = true;
            this.checkHit();
        }

        if (this.player.attackTimer <= 0) {
            this.player.isAttacking = false;
            this.katana.rotation.copy(this.katanaBaseRot);
            this.katana.position.copy(this.katanaBasePos);
        }
    }

    checkHit() {
        const origin = this.camera.position;
        const dir = new THREE.Vector3(0,0,-1).applyQuaternion(this.camera.quaternion);
        const raycaster = new THREE.Raycaster(origin, dir, 0, 3.5);

        for (const enemy of this.enemies) {
            if (!enemy.mesh || enemy.hp <= 0) continue;
            const hits = raycaster.intersectObject(enemy.mesh, true);
            if (hits.length > 0) {
                const dead = enemy.takeDamage(50);
                this.audio.playHit();
                this.particles.burst(hits[0].point, 0xff2200, 15);
                if (dead) this.showMessage(enemy.type === 'cat' ? "Cat eliminated!" : "Enemy down!");
                return;
            }
        }
    }

    updatePlayer(dt) {
        if (this.state !== 'PLAYING') return;

        this.player.rotation.y -= this.lookInput.x;
        this.player.rotation.x -= this.lookInput.y;
        this.player.rotation.x = Math.max(-Math.PI/2.2, Math.min(Math.PI/2.2, this.player.rotation.x));
        this.camera.rotation.order = 'YXZ';
        this.camera.rotation.y = this.player.rotation.y;
        this.camera.rotation.x = this.player.rotation.x;

        const moving = Math.abs(this.joystick.value.x) > 0.1 || Math.abs(this.joystick.value.y) > 0.1;
        if (this.sprintPressed && this.player.stamina > 8 && moving) {
            this.player.isSprinting = true;
            this.player.stamina -= 35 * dt;
        } else {
            this.player.isSprinting = false;
            if (this.player.stamina < this.player.maxStamina) this.player.stamina += 25 * dt;
        }
        this.player.stamina = Math.max(0, Math.min(this.player.maxStamina, this.player.stamina));

        const speed = this.player.isSprinting ? 9 : 5;
        const forward = new THREE.Vector3(0,0,-1).applyAxisAngle(new THREE.Vector3(0,1,0), this.player.rotation.y);
        const right = new THREE.Vector3(1,0,0).applyAxisAngle(new THREE.Vector3(0,1,0), this.player.rotation.y);

        const move = new THREE.Vector3();
        move.addScaledVector(forward, -this.joystick.value.y);
        move.addScaledVector(right, this.joystick.value.x);
        if (move.length() > 1) move.normalize();

        const newPos = this.player.position.clone();
        newPos.x += move.x * speed * dt;
        newPos.z += move.z * speed * dt;

        if (!this.checkWallCollision(newPos)) {
            this.player.position.copy(newPos);
        } else {
            const tryX = this.player.position.clone();
            tryX.x += move.x * speed * dt;
            if (!this.checkWallCollision(tryX)) this.player.position.copy(tryX);
            else {
                const tryZ = this.player.position.clone();
                tryZ.z += move.z * speed * dt;
                if (!this.checkWallCollision(tryZ)) this.player.position.copy(tryZ);
            }
        }

        this.player.position.y = this.player.height;
        this.camera.position.copy(this.player.position);

        if (move.length() > 0.1) {
            this.player.stepTimer -= dt;
            if (this.player.stepTimer <= 0) {
                this.player.stepTimer = this.player.isSprinting ? 0.28 : 0.45;
                this.audio.playStep();
            }
        }

        document.getElementById('hpFill').style.width = (this.player.hp / this.player.maxHp * 100) + '%';
        document.getElementById('staminaFill').style.width = (this.player.stamina / this.player.maxStamina * 100) + '%';

        if (this.exitPosition) {
            const dist = Math.round(this.player.position.distanceTo(this.exitPosition));
            document.getElementById('exitIndicator').textContent = `EXIT: ${dist}m`;
        }
    }

    checkWallCollision(pos) {
        const c = pos.clone().add(new THREE.Vector3(0,0.5,0));
        const dirs = [new THREE.Vector3(1,0,0), new THREE.Vector3(-1,0,0), new THREE.Vector3(0,0,1), new THREE.Vector3(0,0,-1)];
        for (const d of dirs) {
            const ray = new THREE.Raycaster(c, d, 0, this.player.radius);
            if (ray.intersectObjects(this.mapMeshes, false).length > 0) return true;
        }
        return false;
    }

    updateWalkieTalkie(dt) {
        if (!this.exitPosition) return;
        const dist = this.player.position.distanceTo(this.exitPosition);
        this.beepInterval = Math.max(0.4, dist / 8);

        this.lastBeep -= dt;
        if (this.lastBeep <= 0) {
            this.lastBeep = this.beepInterval;
            this.audio.playBeep();
            this.walkie.traverse(c => {
                if (c.material && c.material.emissive) {
                    c.material.emissiveIntensity = 2;
                    setTimeout(() => { if(c.material) c.material.emissiveIntensity = 0.5; }, 150);
                }
            });
        }
    }

    showMessage(text) {
        const msg = document.getElementById('message');
        msg.textContent = text;
        msg.style.opacity = 1;
        setTimeout(() => msg.style.opacity = 0, 2500);
    }

    flashDamage() {
        const flash = document.getElementById('damageFlash');
        flash.style.opacity = '1';
        setTimeout(() => flash.style.opacity = '0', 200);
    }

    checkExit() {
        if (!this.exitPosition || this.state !== 'PLAYING') return;
        if (this.player.position.distanceTo(this.exitPosition) < 2.5) {
            this.state = 'WIN';
            document.getElementById('goText').textContent = 'YOU ESCAPED';
            document.getElementById('goText').style.color = '#33ff66';
            document.getElementById('goSub').textContent = 'The backrooms release you... for now.';
            document.getElementById('gameOverScreen').style.display = 'flex';
            this.audio.stopBuzz();
        }
    }

    animate() {
        requestAnimationFrame(() => this.animate());
        const dt = Math.min(this.clock.getDelta(), 0.15);

        if (this.state === 'PLAYING') {
            this.updatePlayer(dt);
            this.updateAttack(dt);
            this.particles.update(dt);

            const collected = this.chickSystem?.update(dt, this.player.position, this.camera);
            if (collected) {
                this.audio.playChick();
                this.showMessage(`Chick found! (${this.chickSystem.collected})`);
                document.getElementById('chickCounter').textContent = `Chicks: ${this.chickSystem.collected}`;
            }

            this.updateWalkieTalkie(dt);

            for (let i = this.enemies.length - 1; i >= 0; i--) {
                const dmg = this.enemies[i].update(dt, this.player.position);
                if (dmg > 0) {
                    this.player.hp -= dmg;
                    this.flashDamage();
                    this.showMessage(`HP: ${Math.max(0, Math.ceil(this.player.hp))}`);
                    if (this.player.hp <= 0) {
                        this.state = 'DEAD';
                        document.getElementById('goText').textContent = 'YOU DIED';
                        document.getElementById('goText').style.color = '#ff3333';
                        document.getElementById('goSub').textContent = 'No one hears you scream in the backrooms.';
                        document.getElementById('gameOverScreen').style.display = 'flex';
                        this.audio.stopBuzz();
                    }
                }
                if (this.enemies[i].hp <= 0) {
                    this.enemies.splice(i, 1);
                }
            }

            if (this.exitParticles) {
                const pos = this.exitParticles.geometry.attributes.position.array;
                for (let i = 0; i < pos.length/3; i++) {
                    pos[i*3+1] += dt * 0.8;
                    if (pos[i*3+1] > 3) pos[i*3+1] = 0;
                }
                this.exitParticles.geometry.attributes.position.needsUpdate = true;
            }

            this.checkExit();
        }

        this.renderer.render(this.scene, this.camera);
    }
}

const game = new Game();
window.game = game;
game.animate();
</script>
